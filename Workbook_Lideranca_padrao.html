<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workbook Liderança Eficaz – Haggai Brasil · PADRÃO VISUAL</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="icon" href="data:,">
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
    <style>
        /* ── RESET & BASE ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #141414;
            font-family: var(--font-base);
            color: var(--text);
        }

        /* ── PRINT CONFIG ── */
        @page {
            size: 148mm 210mm;
            margin: 0;
        }

        @media print {
            body {
                background: white !important;
            }

            .nav-bar,
            .twk-panel,
            .no-print {
                display: none !important;
            }

            .stage {
                padding: 0 !important;
                gap: 0 !important;
                display: block !important;
            }

            .page {
                box-shadow: none !important;
                margin: 0 !important;
                page-break-after: always;
                break-after: page;
            }
        }

        /* ── LAYOUT ── */
        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            gap: 30px;
        }

        /* Fixed A5 Container */
        .page {
            width: 148mm;
            height: 210mm;
            background: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        /* Useful Area & Mirrored Margins 
    Top: 1.3cm, Bottom: 1.3cm, Internal: 1.8cm, External: 1.1cm
    Odd: Left=Internal(1.8), Right=External(1.1)
    Even: Left=External(1.1), Right=Internal(1.8)
*/
        .pg {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .pg-odd {
            padding: 0 1.1cm 0 1.8cm;
        }

        .pg-even {
            padding: 0 1.8cm 0 1.1cm;
        }

        /* Components staying inside Useful Area */
        .pg-hdr {
            height: calc(1.3cm + 22px);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            background: #001f33;
            padding-bottom: 5px;
            margin-bottom: 6px;
            margin-top: 0;
            flex-shrink: 0;
        }

        .pg-odd .pg-hdr {
            margin-left: -1.8cm;
            margin-right: -1.1cm;
            padding-left: 1.8cm;
            padding-right: 1.1cm;
        }

        .pg-even .pg-hdr {
            margin-left: -1.1cm;
            margin-right: -1.8cm;
            padding-left: 1.1cm;
            padding-right: 1.8cm;
        }

        .pg-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 0;
            overflow: hidden;
        }

        .pg-ftr {
            margin-top: auto;
            border-top: 1px solid #d8ccbc;
            padding-top: 2px;
            padding-bottom: 1.3cm;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        /* ── COLOR TOKENS & TYPOGRAPHY ── */
        :root {
            /* ── Cores de Marca ── */
            --navy:        #002B49;
            --navy-rgb:    0, 43, 73;
            --navy-dark:   #001f33;
            --navy-light:  rgba(0, 43, 73, 0.06);
            --amber:       #e07b2a;
            --amber-rgb:   224, 123, 42;
            --amber-light: rgba(224, 123, 42, 0.07);
            --gold:        #d4a017;
            --gold-rgb:    212, 160, 23;
            --gold-light:  rgba(212, 160, 23, 0.07);
            --forest:      #3d7a35;          /* verde botânico — 3º item em listas */
            --forest-light: rgba(61, 122, 53, 0.07);

            /* ── Neutros ── */
            --text:        #2c2c2c;
            --muted:       #666;
            --slate:       #475569;
            --bg:          #fdfaf6;
            --warm:        #f5ede0;          /* creme quente — fundo de tabelas/caixas */
            --divider:     #d8ccbc;          /* linha separadora */

            /* ── Tipografia ── */
            --font-base:    'Source Sans 3', sans-serif;
            --font-heading: 'Cormorant Garamond', serif;
            --font-mono:    'DM Mono', monospace;
        }

        /* ── TYPOGRAPHY ── */
        .tag {
            font-family: var(--font-base);
            font-size: 14.7px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--amber);
        }

        .h1 {
            font-family: var(--font-heading);
            font-size: 34px;
            line-height: 1.1;
            color: var(--navy);
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }

        .h1-sm {
            font-size: 34px;
        }

        .subtitle {
            font-family: var(--font-base);
            font-size: 14.7px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .body {
            font-size: 12px;
            line-height: 1.45;
            color: var(--text);
        }

        .small-note {
            font-size: 9px;
            color: #888;
            line-height: 1.4;
            background: none;
            padding: 0;
        }

        .pg-odd .small-note {
            text-align: left;
        }

        .pg-even .small-note {
            text-align: right;
        }

        /* ── COMPONENTS ── */
        .divider {
            border: none;
            border-top: 1px solid #d8ccbc;
        }

        .hl-box {
            background: var(--warm);
            border-left: 3px solid var(--amber);
            padding: 7px 10px;
            font-size: 12px;
            line-height: 1.5;
            color: var(--text);
        }

        .hl-box strong {
            color: var(--navy);
        }

        .quote-block {
            border-top: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            padding: 7px 4px;
            text-align: center;
            margin: 5px 0;
        }

        .quote-text {
            font-family: var(--font-heading);
            font-size: 14.5px;
            font-style: italic;
            color: var(--navy);
            line-height: 1.45;
        }

        .quote-ref {
            font-family: var(--font-base);
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .leader-item {
            font-size: 13.3px;
            line-height: 1.4;
            color: var(--text);
            padding: 5px 9px;
            border-left: 2px solid var(--gold);
            background: rgba(240, 170, 48, 0.06);
        }

        .leader-item > strong {
            color: var(--navy);
            font-size: 13.3px;
            display: block;
            margin-bottom: 1px;
        }

        .write-line {
            border-bottom: 1px solid #d0c0a8;
            height: 18px;
        }

        .refl-box {
            border: 1.5px solid var(--navy);
            padding: 8px 10px;
            border-radius: 2px;
        }

        .refl-label {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 5px;
        }

        .check-sq {
            width: 11px;
            height: 11px;
            border: 1.5px solid var(--navy);
            flex-shrink: 0;
            display: inline-block;
        }

        /* Tables */
        .score-grid {
            display: grid;
            grid-template-columns: 1fr 52px;
            gap: 1px;
            background: #d0c0a8;
            border: 1px solid #d0c0a8;
        }

        .sc-cell {
            background: #fff;
            padding: 4px 8px;
            font-size: 12px;
            line-height: 1.4;
            color: var(--text);
        }

        .sc-num {
            background: var(--warm);
            padding: 4px 6px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sc-hdr {
            background: var(--navy) !important;
            color: rgba(255, 255, 255, 0.75) !important;
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .cmp-grid {
            display: grid;
            grid-template-columns: 1fr 22px 1fr;
            gap: 1px;
            background: #d0c0a8;
            border: 1px solid #d0c0a8;
            font-size: 11.5px;
        }

        .cmp-hdr-a {
            background: var(--navy);
            color: #fff;
            padding: 5px 7px;
            font-family: var(--font-mono);
            font-size: 8px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .cmp-hdr-n {
            background: var(--amber);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
        }

        .cmp-hdr-b {
            background: var(--muted);
            color: rgba(255, 255, 255, 0.85);
            padding: 5px 7px;
            font-family: 'DM Mono', monospace;
            font-size: 8px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .cmp-a {
            padding: 4px 7px;
            line-height: 1.35;
            background: #fff;
        }

        .cmp-n {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--amber);
            font-weight: 700;
            background: #fff;
        }

        .cmp-b {
            padding: 4px 7px;
            line-height: 1.35;
            color: var(--muted);
            background: #fff;
        }

        .dna-table {
            width: 100%;
            border-collapse: collapse;
        }

        .dna-table th {
            padding: 4px;
            font-family: 'DM Mono', monospace;
            font-size: 8px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-align: center;
        }

        .dna-th-l {
            background: var(--navy);
            color: #fff;
        }

        .dna-th-m {
            background: var(--warm);
            color: var(--muted);
            font-size: 7px;
        }

        .dna-th-r {
            background: var(--amber);
            color: #fff;
        }

        .dna-table td {
            font-size: 10px;
            line-height: 1.35;
            padding: 3px 4px;
            border-bottom: 1px solid #ddd0be;
        }

        /* Header/Footer Elements */
        .pg-hdr-lbl {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
        }

        .pg-num {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--gold);
        }

        .pg-ftr-brand {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .pg-ftr-num {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: var(--amber);
            font-weight: 600;
        }

        .chk-item {
            display: flex;
            align-items: flex-start;
            gap: 7px;
            font-size: 12px;
            color: var(--text);
            line-height: 1.45;
        }

        .case-item {
            padding: 5px 9px;
            background: var(--warm);
            margin-bottom: 4px;
        }

        .case-tag {
            font-family: 'DM Mono', monospace;
            font-size: 8px;
            color: var(--amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .case-text {
            font-size: 11.5px;
            line-height: 1.4;
            color: var(--text);
            margin-bottom: 4px;
        }

        .case-opts {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px;
        }

        .case-opt {
            border: 1px solid var(--navy);
            font-size: 8px;
            padding: 2px 1px;
            text-align: center;
            color: var(--navy);
            font-family: 'DM Mono', monospace;
        }

        .al-sec {
            margin-bottom: 7px;
        }

        .al-title {
            font-family: var(--font-heading);
            font-size: 12.5px;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: 2px;
            padding-bottom: 2px;
            border-bottom: 1px solid var(--gold);
        }

        .al-sub {
            font-weight: 600;
            font-size: 12px;
            color: var(--navy);
            margin: 3px 0 1px;
        }

        .al-body {
            font-size: 12px;
            line-height: 1.5;
            color: var(--text);
        }

        .al-ask {
            font-size: 11px;
            color: var(--amber);
            font-style: italic;
            margin-top: 2px;
            line-height: 1.45;
        }

        .al-list {
            list-style: none;
            padding: 0;
            margin: 1px 0;
        }

        .al-list li {
            font-size: 12px;
            padding: 1px 0 1px 12px;
            position: relative;
            color: var(--text);
            line-height: 1.45;
        }

        .al-list li::before {
            content: '›';
            position: absolute;
            left: 0;
            color: var(--amber);
            font-weight: 700;
        }

        .nav-bar,
        .spread-container {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Logo = ({ style }) => (
            <img src="assets/images/image1.png" alt="Haggai Brasil" style={style} />
        );

        const Page = ({ hdr, num, children }) => {
            const parity = num % 2 === 0 ? 'pg-even' : 'pg-odd';
            const isOdd = num % 2 !== 0;

            return (
                <div className={`page page-${num}`}>
                    <div className={`pg ${parity}`}>
                        <div className="pg-hdr" style={{ justifyContent: isOdd ? 'flex-end' : 'flex-start', gap: '12px' }}>
                            {isOdd
                                ? <><span className="pg-hdr-lbl">Matéria Liderança Eficaz</span><span className="pg-num">{String(num).padStart(2, '0')}</span></>
                                : <><span className="pg-num">{String(num).padStart(2, '0')}</span><span className="pg-hdr-lbl">Matéria Liderança Eficaz</span></>
                            }
                        </div>
                        <div className="pg-body">{children}</div>
                        <div className="pg-ftr">
                            <span className="pg-ftr-brand">Haggai Brasil</span>
                        </div>
                    </div>
                </div>
            );
        };

        const Lines = ({ n = 4 }) => (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                {Array(n).fill(0).map((_, i) => <div key={i} className="write-line" />)}
            </div>
        );

        // ─── PAGES ─────────────────────────────────────────────────────────────────

        const P1_Cover = () => (
            <div className="page page-1">
                <div className="pg-cover" style={{ background: 'var(--navy)', width: '100%', height: '100%', display: 'flex', flexDirection: 'column', padding: '36px 42px 30px 42px' }}>
                    <div style={{ background: 'var(--amber)', height: 7, margin: '-36px -42px 24px -42px' }} />
                    
                    <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 20 }}>
                        <Logo style={{ height: 90, filter: 'brightness(0) invert(1) opacity(0.85)' }} />
                    </div>

                    <div style={{ fontFamily: 'var(--font-mono)', fontSize: '9px', letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--amber)', marginBottom: 20, textAlign: 'center' }}>
                        Curso Nacional de Liderança Avançada
                    </div>
                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', textAlign: 'center' }}>
                        <div style={{ fontFamily: 'var(--font-base)', fontSize: '10px', letterSpacing: '0.15em', textTransform: 'uppercase', color: 'rgba(255,255,255,0.4)', marginBottom: 8 }}>Apostila</div>
                        <div className="h1" style={{ fontSize: '50px', color: '#fff', fontWeight: 700 }}>
                            Liderança<br />
                            <span style={{ color: 'var(--gold)' }}>Eficaz</span>
                        </div>
                    </div>
                    <div style={{ textAlign: 'center' }}>
                        <div style={{ fontSize: '10px', color: 'rgba(255,255,255,0.45)', marginBottom: 3 }}>Por</div>
                        <div style={{ fontFamily: 'var(--font-heading)', fontSize: '17px', color: 'rgba(255,255,255,0.88)', fontWeight: 600, marginBottom: 28 }}>Ebenézer Bittencourt</div>
                        <div style={{ borderTop: '1px solid rgba(255,255,255,0.12)', marginTop: 18 }}></div>
                        <div style={{ marginTop: 22, textAlign: 'center', color: 'rgba(255,255,255,0.35)', fontSize: '7.5px', lineHeight: 1.4, fontFamily: 'var(--font-base)' }}>
                            <strong>Copyright © 2022 Noutética Publicações.</strong> Nenhuma parte desta apostila pode ser reproduzida sem o consentimento prévio, por escrito, da publicadora, exceto por breves citações com indicação da fonte.<br />
                            Este material foi produzido para uso exclusivo nos programas de treinamento do Haggai Institute Brasil.
                        </div>
                    </div>
                </div>
            </div>
        );

        const P2_Info = () => (
            <div className="page page-2">
                <div className="pg" />
            </div>
        );

        const P3_LiderQueDeusQuer = () => (
            <Page hdr="O Líder que Deus Quer" num={3}>
                <div className="h1" style={{ marginBottom: '12px' }}>O Líder que Deus Quer</div>

                <div style={{ display: 'flex', gap: '12px', alignItems: 'center', marginBottom: '12px' }}>
                    <div style={{ flex: 1 }}>
                        <div className="body" style={{ 
                            fontSize: '12.5px', 
                            lineHeight: 1.4, 
                            color: '#334155', 
                            fontStyle: 'italic', 
                            textAlign: 'justify',
                            borderLeft: '3px solid var(--gold)',
                            background: 'linear-gradient(to right, rgba(212, 172, 13, 0.05), transparent)',
                            padding: '10px 12px'
                        }}>
                            A Vontade de Deus é que o líder tenha um forte desejo de servir na liderança, tanto profissional quanto ministerial. Além do desejo, ele precisa cuidar de pessoas e aprender a estabelecer procedimentos.
                        </div>
                    </div>
                    <div style={{ flex: 1.2 }}>
                        <img src="assets/images/image2.png" style={{ width: '100%', maxHeight: '120px', objectFit: 'contain' }} />
                    </div>
                </div>

                <div style={{ display: 'flex', flexDirection: 'column', gap: '5px', marginBottom: '10px' }}>
                    {/* Item 1 */}
                    <div style={{ 
                        background: '#fff', 
                        borderRadius: '6px', 
                        padding: '8px 12px' 
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
                            <div style={{ background: 'var(--amber)', color: '#fff', width: '20px', height: '20px', borderRadius: '4px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 'bold', fontSize: '12px', flexShrink: 0 }}>1</div>
                            <strong style={{ fontSize: '13px', color: 'var(--navy)', letterSpacing: '0.01em' }}>Um líder que DESEJA SERVIR na área de liderança.</strong>
                        </div>
                        <div className="body" style={{ fontSize: '12px', textAlign: 'justify', lineHeight: 1.4, color: '#334155', marginBottom: '6px' }}>
                            O líder <i>aspira</i> servir e o Espírito Santo dispõe as oportunidades. <strong>Para aumentar seu desejo</strong> de liderar: (a) leia livros sobre liderança, (b) faça cursos sobre liderança e (c) aceite oportunidades de liderar – crescendo em suas responsabilidades.
                        </div>
                        <div className="small-note" style={{ 
                            background: '#F8FAFC', 
                            borderLeft: '2.5px solid var(--navy)', 
                            padding: '6px 10px', 
                            borderRadius: '0 4px 4px 0', 
                            textAlign: 'justify',
                            color: '#475569',
                            fontFamily: 'var(--font-heading)',
                            fontSize: '12.5px',
                            fontStyle: 'italic'
                        }}>
                            • Fiel é a palavra: se alguém <span style={{ borderBottom: '1px solid var(--navy)' }}>aspira</span> ao episcopado, excelente obra <span style={{ borderBottom: '1px solid var(--navy)' }}>almeja</span> – 1 Tm 3.1.
                        </div>
                    </div>

                    {/* Item 2 */}
                    <div style={{ 
                        background: '#fff', 
                        borderRadius: '6px', 
                        padding: '8px 12px' 
                    }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '6px' }}>
                            <div style={{ background: 'var(--amber)', color: '#fff', width: '20px', height: '20px', borderRadius: '4px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 'bold', fontSize: '12px', flexShrink: 0 }}>2</div>
                            <strong style={{ fontSize: '13px', color: 'var(--navy)', letterSpacing: '0.01em' }}>Um líder que CUIDA DE PESSOAS.</strong>
                        </div>
                        <div className="body" style={{ fontSize: '12px', textAlign: 'justify', lineHeight: 1.4, color: '#334155', marginBottom: '6px' }}>
                            <strong>Cuidar dos liderados</strong> envolve estar atento às suas necessidades individuais e coletivas, fornecer apoio, orientação e recursos além de mobilizá-los na execução da tarefa.
                        </div>
                        <div className="small-note" style={{ 
                            background: '#F8FAFC', 
                            borderLeft: '2.5px solid var(--navy)', 
                            padding: '6px 10px', 
                            borderRadius: '0 4px 4px 0', 
                            textAlign: 'justify',
                            color: '#475569',
                            fontFamily: 'Cormorant Garamond, serif',
                            fontSize: '12.5px',
                            fontStyle: 'italic'
                        }}>
                            • Como <span style={{ borderBottom: '1px solid var(--navy)' }}>cuidará</span> da igreja de Deus? – 1 Tm 3.5. <span style={{ borderBottom: '1px solid var(--navy)' }}>Atendei</span> por vós e por todo o rebanho sobre o qual o Espírito Santo vos constituiu bispos – At 20.28.
                        </div>

                        <AlignItem num={7} title="Liderança Inspiradora">Reflita sobre o seu papel como líder. Inspire sua equipe a seguir a visão por meio de exemplos práticos, entusiasmo e reconhecimento das contribuições individuais.</AlignItem>

                    <AlignItem num={9} title="Necessidade de Mudanças">Avalie se é necessário <u style={{ textDecorationColor: 'var(--navy)', textUnderlineOffset: '2px' }}>reestruturar</u> a equipe para manter a harmonia e eficiência, considerando tanto o desempenho quanto a cultura organizacional. Talvez seja necessário <u style={{ textDecorationColor: 'var(--navy)', textUnderlineOffset: '2px' }}>despedir</u> a pessoa tóxica que atrapalha a equipe.</AlignItem>

            return (
                <div className="stage">

                    <div id="p1" className="page-wrapper"><P1_Cover /></div>

            if (window.location.search.includes('print')) window.print();
        }, 1000);
    </script>
</body>
